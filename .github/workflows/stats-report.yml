name: Report bundle stats

on:
  workflow_run:
    workflows: ["Generate bundle report"]
    types:
      - completed

permissions:
  contents: read
  pull-requests: write

jobs:
  bundle-stat-report:
    if: >
      github.event.workflow_run.conclusion == 'success'

    runs-on: ubuntu-latest

    env:
      PR_NUMBER: ${{ github.event.workflow_run.pull_requests[0].number }}
      HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
      BASE_HEAD: ${{ github.event.workflow_run.pull_requests[0].base.ref }}

    steps:
      - name: Set stats path
        run: |
          echo "STATS_PATH=${{ runner.temp }}/axios-stats" >> $GITHUB_ENV

      - name: Checkout base branch HEAD
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ env.BASE_HEAD }}

      - name: Setup node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.x
          cache: npm

      - name: Install deps
        run: npm ci --ignore-scripts

      - name: Pick comment data from cache
        id: cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ env.STATS_PATH }}
          key: stats-v1-${{ github.repository }}-${{ env.PR_NUMBER }}-${{ env.HEAD_SHA }}

      - name: Post report comment
        if: steps.cache.outputs.cache-hit == 'true'
        run: |
          node scripts/report.js --file ${{ env.STATS_PATH }}/report.md

