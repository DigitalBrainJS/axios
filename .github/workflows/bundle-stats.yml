name: Bundle size analyzer

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Continuous integration"]
    types:
      - completed

permissions:
  contents: read

jobs:
  bundle-size:
    name: Analyze bundle size
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Setup node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24.x
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build (PR)
        run: npm run build

      - name: Collect stats (PR)
        run: node scripts/bundle-stats.js pr



      - name: Restore cache
        id: cache
        uses: actions/cache@v4
        with:
          path: .cache/bundle-stats
          key: bundle-stats-${{ github.event.pull_request.base.sha }}

      - name: Checkout base branch
        if: steps.cache.outputs.cache-hit == 'false'
        run: git checkout origin/${{ github.base_ref }}

      - name: Install dependencies
        if: steps.cache.outputs.cache-hit == 'false'
        run: npm ci --ignore-scripts

      - name: Build (base)
        if: steps.cache.outputs.cache-hit == 'false'
        run: npm run build

      - name: Collect stats (base)
        if: steps.cache.outputs.cache-hit == 'false'
        run: node scripts/bundle-stats.js

      - name: Compare stats
        id: compare
        run: node scripts/bundle-stats.js --report
