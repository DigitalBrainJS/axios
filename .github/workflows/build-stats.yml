name: Bundle size analyzer

on:
  workflow_run:
    workflows: ["Continuous integration"]
    types:
      - completed

permissions:
  contents: read

jobs:
  collect_stats:
    name: Collect stats
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.pull_requests[0] != null

    runs-on: ubuntu-latest

    env:
      PR_NUMBER: ${{ github.event.workflow_run.pull_requests[0].number }}
      BASE_REF: ${{ github.event.workflow_run.pull_requests[0].base.ref }}
      HEAD_SHA: ${{ github.event.workflow_run.head_sha }}

    steps:
      - name: Set stats path
        run: |
          echo "STATS_PATH=${{ runner.temp }}/axios-stats" >> $GITHUB_ENV

      - name: Ensure axios-stats dir exists
        run: mkdir -p ${{ env.STATS_PATH }}

      # Restore cache for all commits (BASE, HEAD) to speed up stats collection
      - name: Restore stats cache
        id: cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ env.STATS_PATH }}
          key: stats-v1-${{ github.repository }}-${{ env.PR_NUMBER }}-${{ env.HEAD_SHA }}
          restore-keys: |
            stats-v1-${{ github.repository }}-${{ env.PR_NUMBER }}-
            stats-v1-${{ github.repository }}-

      - name: Cache hit info
        run: |
          echo "cache-hit=${{ steps.cache.outputs.cache-hit }} for ${{ env.HEAD_SHA }}" 

      - name: Checkout base branch HEAD
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ env.BASE_REF }}
          path: base-head

      - name: Checkout PR HEAD
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          path: pr
          fetch-depth: 0

      - name: Determine merge base
        working-directory: pr
        run: |
          git fetch origin "$BASE_REF"
          BASE_SHA=$(git merge-base HEAD "origin/$BASE_REF")
          echo "BASE_SHA=$BASE_SHA" >> $GITHUB_ENV
          echo "Merge base: $BASE_SHA"    

      - name: Info
        run: |
          echo "STATS PATH: ${{ env.STATS_PATH }}"
          echo "BASE: ${{ env.BASE_SHA }}"
          echo "HEAD: ${{ env.HEAD_SHA }}"
          echo "key: stats-v1-${{ github.repository }}-${{ env.PR_NUMBER }}-${{ env.HEAD_SHA }}"               

      - name: Install BASE HEAD deps
        working-directory: base-head
        run: npm ci --ignore-scripts

      - name: Setup node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.x
          cache: npm
          cache-dependency-path: |
            base-head/package-lock.json
            pr/package-lock.json

      # BASE snapshot check and collection
      - name: Check BASE snapshot
        id: base_snapshot
        run: |
          FILE="$STATS_PATH/$BASE_SHA.json"
          
          if [ -f "$FILE" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi   

      - name: Checkout to BASE
        if: steps.base_snapshot.outputs.exists != 'true'
        working-directory: pr
        run: |
          git reset --hard
          git clean -fd
          git checkout "$BASE_SHA"

      - name: Install BASE dependencies
        if: steps.base_snapshot.outputs.exists != 'true'
        working-directory: pr
        run: npm ci --ignore-scripts

      - name: Build axios for BASE
        if: steps.base_snapshot.outputs.exists != 'true'
        working-directory: pr
        run: npm run build

      - name: Collect BASE stats
        if: steps.base_snapshot.outputs.exists != 'true'
        working-directory: pr
        run: |
          node ../base-head/scripts/build-stat.js snapshot -s
      #############################################

      - name: Checkout HEAD
        working-directory: pr
        run: |
          git reset --hard
          git clean -fd
          git checkout "$HEAD_SHA"

      - name: Install HEAD dependencies
        working-directory: pr
        run: npm ci --ignore-scripts

      - name: Build axios for HEAD
        working-directory: pr
        run: npm run build

      - name: Collect HEAD stats
        working-directory: pr
        run: |
          node ../base-head/scripts/build-stat.js snapshot -s   

      - name: Generate report
        working-directory: pr
        id: report
        env:
          STAT_BASE: ${{ github.event.workflow_run.head_repository.full_name == github.repository && github.event.workflow_run.head_branch == 'release' && 'release' || github.event.workflow_run.pull_requests[0].base.sha }}
        run: |
          node ../base-head/scripts/build-stat.js report dist/esm/axios.min.js dist/axios.min.js --releases 20 --base "$STAT_BASE" --file ${{ runner.temp }}/bundle-report/report.md

      - name: Upload report artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bundle-report
          path: ${{ runner.temp }}/bundle-report

  report:
    name: Post bundle report
    needs: collect_stats
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    env:
      PR_NUMBER: ${{ github.event.workflow_run.pull_requests[0].number }}
      BASE_REF: ${{ github.event.workflow_run.pull_requests[0].base.ref }}
      HEAD_SHA: ${{ github.event.workflow_run.head_sha }}

    steps:
      - name: Checkout base branch HEAD
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ env.BASE_REF }}

      - name: Setup node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.x
          cache: npm

      - name: Install BASE HEAD deps
        run: npm ci --ignore-scripts

      - name: Download report artifact
        if: needs.collect_stats.result == 'success'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: bundle-report
          path: ${{ runner.temp }}/bundle-report

      - name: Post report comment
        if: needs.collect_stats.result == 'success'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node scripts/report.js --file ${{ runner.temp }}/bundle-report/report.md

      - name: Post failed report comment
        if: needs.collect_stats.result == 'failure'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node scripts/report.js "**⚠️ Bundle report generation failed for this PR ($HEAD_SHA). Please check the workflow run for details.**"
