name: Bundle size analyzer

on:
  workflow_run:
    workflows: ["Continuous integration"]
    types:
      - completed

permissions:
  contents: read
  pull-requests: write

jobs:
  bundle-size:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request'

    runs-on: ubuntu-latest

    env:
      PR_NUMBER: ${{ github.event.workflow_run.pull_requests[0].number }}
      BASE_REF_ARG: ${{ github.event.workflow_run.head_repository.full_name == github.repository && github.event.workflow_run.head_branch == 'release' && 'release' || github.event.workflow_run.pull_requests[0].base.sha }}
      STATS_PATH: ${{ runner.temp }}/axios-stats

    steps:
      - name: Checkout PR HEAD
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Ensure axios-stats dir exists
        run: mkdir -p ${{ runner.temp }}/axios-stats

      - name: Setup node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.x
          cache: npm

      - name: Checkout to BASE
        run: |
          git reset --hard
          git clean -fd
          git checkout ${{ github.event.workflow_run.pull_requests[0].base.sha }}

      - name: Install BASE dependencies
        run: npm ci --ignore-scripts

      - name: Info
        run: |
          echo "STATS PATH: ${{ env.STATS_PATH }}"
          echo "BASE: ${{ github.event.workflow_run.pull_requests[0].base.sha }}"
          echo "HEAD: ${{ github.event.workflow_run.head_sha }}"
          echo "key: stats-v1-${{ github.repository }}-${{ env.PR_NUMBER }}-${{ github.event.workflow_run.head_sha }}"        

      # post install hook is required
      #- name: Install esbuild
      #  run: npm install esbuild

      - name: Build stats script from BASE
        run: |
          npx esbuild scripts/build-stat.js \
          --bundle \
          --platform=node \
          --format=cjs \
          --outfile=${{ runner.temp }}/build-stat.js

      # Restore cache for all commits (BASE, HEAD) to speed up stats collection
      - name: Restore stats cache
        id: cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STATS_PATH }}
          key: stats-v1-${{ github.repository }}-${{ env.PR_NUMBER }}-${{ github.event.workflow_run.head_sha }}
          restore-keys: |
            stats-v1-${{ github.repository }}-${{ env.PR_NUMBER }}-
            stats-v1-${{ github.repository }}-

      - name: Cache hit info
        run: |
          echo "cache-hit=${{ steps.cache.outputs.cache-hit }} for ${{ github.event.workflow_run.head_sha }}"      

      - name: Check BASE snapshot
        id: base_snapshot
        run: |
          FILE="${{ runner.temp }}/axios-stats/${{ github.event.workflow_run.pull_requests[0].base.sha }}.json"
      
          if [ -f "$FILE" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi      

      - name: Build axios
        if: steps.base_snapshot.outputs.exists != 'true'
        run: npm run build

      - name: Collect BASE stats
        if: steps.base_snapshot.outputs.exists != 'true'
        working-directory: ${{ github.workspace }}
        run: |
          node ${{ runner.temp }}/build-stat.js snapshot -s   

      - name: Checkout back to HEAD
        run: |
          git reset --hard
          git clean -fd
          git checkout ${{ github.event.workflow_run.head_sha }}

      - name: Install HEAD dependencies
        run: npm ci --ignore-scripts

      - name: Build axios
        run: npm run build

      - name: Collect HEAD stats
        working-directory: ${{ github.workspace }}
        run: |
          node ${{ runner.temp }}/build-stat.js snapshot -s   

      - name: Generate & Post report
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: ${{ github.workspace }}
        id: report
        run: |
          node ${{ runner.temp }}/build-stat.js report dist/esm/axios.min.js dist/axios.min.js --releases 5 --base "$BASE_REF_ARG"
