name: Bundle size analyzer

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read
  pull-requests: write

jobs:
  bundle_size:
    name: Bundle size report
    runs-on: ubuntu-latest

    env:
      PR_NUMBER: ${{ github.event.pull_request.number }}
      BASE_REF: ${{ github.event.pull_request.base.ref }}
      BASE_SHA: ${{ github.event.pull_request.base.sha }}
      HEAD_SHA: ${{ github.event.pull_request.head.sha }}

    steps:
      - name: Set stats path
        run: |
          echo "STATS_PATH=${{ runner.temp }}/axios-stats" >> $GITHUB_ENV

      - name: Ensure axios-stats dir exists
        run: mkdir -p "$STATS_PATH"

      #
      # Checkout base branch
      #
      - name: Checkout base branch HEAD
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ env.BASE_REF }}
          path: base-head
          fetch-depth: 0

      #
      # Checkout PR HEAD
      #
      - name: Checkout PR HEAD
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          path: pr
          fetch-depth: 0

      #
      # Determine merge base
      #
      - name: Determine merge base
        working-directory: pr
        run: |
          git remote add upstream https://github.com/${{ github.repository }}.git

          git fetch upstream "$BASE_REF"

          MERGE_BASE=$(git merge-base HEAD "upstream/$BASE_REF")

          echo "MERGE_BASE=$MERGE_BASE" >> $GITHUB_ENV

          echo "Merge base: $MERGE_BASE"

      #
      # Restore cache
      #
      - name: Restore stats cache
        id: cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ env.STATS_PATH }}
          key: stats-v1-${{ github.repository }}-${{ env.PR_NUMBER }}-${{ env.HEAD_SHA }}
          restore-keys: |
            stats-v1-${{ github.repository }}-${{ env.PR_NUMBER }}-
            stats-v1-${{ github.repository }}-

      - name: Setup node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.x
          cache: npm
          cache-dependency-path: |
            base-head/package-lock.json
            pr/package-lock.json

      - name: Install BASE HEAD deps
        working-directory: base-head
        run: npm ci --ignore-scripts

      #
      # BASE snapshot
      #
      - name: Check BASE snapshot
        id: base_snapshot
        run: |
          FILE="$STATS_PATH/$MERGE_BASE.json"

          if [ -f "$FILE" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout to BASE
        if: steps.base_snapshot.outputs.exists != 'true'
        working-directory: pr
        run: |
          git reset --hard
          git clean -fd
          git checkout "$MERGE_BASE"

      - name: Install BASE dependencies
        if: steps.base_snapshot.outputs.exists != 'true'
        working-directory: pr
        run: npm ci --ignore-scripts

      - name: Build axios for BASE
        if: steps.base_snapshot.outputs.exists != 'true'
        working-directory: pr
        run: npm run build

      - name: Collect BASE stats
        if: steps.base_snapshot.outputs.exists != 'true'
        working-directory: pr
        run: |
          node ../base-head/scripts/build-stat.js snapshot -s

      #
      # HEAD snapshot
      #
      - name: Checkout HEAD
        working-directory: pr
        run: |
          git reset --hard
          git clean -fd
          git checkout "$HEAD_SHA"

      - name: Install HEAD dependencies
        working-directory: pr
        run: npm ci --ignore-scripts

      - name: Build axios for HEAD
        working-directory: pr
        run: npm run build

      - name: Collect HEAD stats
        working-directory: pr
        run: |
          node ../base-head/scripts/build-stat.js snapshot -s

      #
      # Generate report
      #
      - name: Generate report
        working-directory: pr
        run: |
          node ../base-head/scripts/build-stat.js report \
            dist/esm/axios.min.js \
            dist/axios.min.js \
            --releases 20 \
            --base "$MERGE_BASE" \
            --file "${{ runner.temp }}/report.md"

      #
      # Post PR comment
      #
      - name: Post report comment
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: base-head
        run: |
          node scripts/report.js --file "${{ runner.temp }}/report.md"

      #
      # Failure comment
      #
      - name: Post failed report comment
        if: failure()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: base-head
        run: |
          node scripts/report.js "**⚠️ Bundle report generation failed for this PR ($HEAD_SHA). Please check the workflow logs.**"
